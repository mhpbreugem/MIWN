name: solve

# Two GitHub Actions workers continuously scan the queue and take any free task:
# claim (git-race lock) -> solve at double-double precision (||F|| < 1e-20) ->
# commit the solutions/pool/<problem>/vNNNN/ result back. Runs on a schedule (so
# it keeps scanning automatically) and on manual dispatch. Concurrency ensures at
# most one run (= 2 workers) is active at a time, so there are never more than two.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min — adjust cadence here

concurrency:
  group: solve
  cancel-in-progress: false   # a new run waits; never >2 workers at once

permissions:
  contents: write

jobs:
  # Release any claims orphaned by a previous run that hit the job time limit,
  # so their tasks become free again before the workers scan.
  prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: standards/methods/requirements.txt
      - run: pip install -r standards/methods/requirements.txt
      - name: Release stale claims (older than 20 min)
        env:
          REPO_ROOT: ${{ github.workspace }}
          QUEUE_REL: todo/TASK_QUEUE.json
          BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 standards/runner/claim_task.py release \
            --project MIWN --queue-path todo/TASK_QUEUE.json --max-age-hours 0.34 || true

  # Two workers, each looping claim -> solve -> repeat until no free task or its
  # time budget (kept under timeout-minutes so a task never gets killed mid-solve).
  solve:
    needs: prep
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        worker: [claude-1, claude-2]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: standards/methods/requirements.txt
      - run: pip install -r standards/methods/requirements.txt
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Scan and take free tasks
        env:
          REPO_ROOT: ${{ github.workspace }}
          QUEUE_REL: todo/TASK_QUEUE.json
          BRANCH: ${{ github.ref_name }}
          WORKER_ID: ${{ matrix.worker }}-${{ github.run_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          END=$(( $(date +%s) + 42*60 ))   # stop ~42 min in, before the 50-min job timeout
          while [ "$(date +%s)" -lt "$END" ]; do
            set +e
            python3 standards/runner/run_task.py --config todo/runner.config.json
            rc=$?
            set -e
            if [ "$rc" -eq 3 ]; then echo "no free task — queue drained for now"; break; fi
            # rc 0 (took+solved), 1 (claim race — another worker got it), 2/4 (bail/partial),
            # 3 handled above: in all non-3 cases keep scanning.
          done
