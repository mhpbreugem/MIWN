name: release

# Independent stale-claim sweeper. Runs every 5 min REGARDLESS of whether a solve
# run is active (separate concurrency group), so claims orphaned by a worker that
# died mid-solve are returned to 'ready' within ~5 min instead of piling up.
# Uses the REST optimistic-SHA path (stdlib only — no pip install needed).

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Release stale claims (older than 15 min) via REST
        env:
          REPO_ROOT: ${{ github.workspace }}
          QUEUE_REL: todo/TASK_QUEUE.json
          BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 standards/runner/claim_task.py release \
            --project MIWN --queue-path todo/TASK_QUEUE.json --max-age-hours 0.25
